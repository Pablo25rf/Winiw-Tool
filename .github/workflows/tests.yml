name: Tests Winiw Scorecard

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests
        env:
          WINIW_ADMIN_USER: test_admin
          WINIW_ADMIN_PASS: test_pass_seguro_123
        run: |
          python -m unittest test_scorecard_v37 -v

      - name: Verificar sintaxis app.py
        run: python -m py_compile app.py && echo "app.py OK"

      - name: Verificar sintaxis motor
        run: python -m py_compile amazon_scorecard_ultra_robust_v3_FINAL.py && echo "motor OK"
